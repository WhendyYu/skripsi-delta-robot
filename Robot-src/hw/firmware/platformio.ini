[env:esp32s3]
platform = espressif32

board = esp32-s3-devkitc-1

framework = arduino

monitor_speed = 115200

upload_speed = 460800

build_flags =
    -Wall
    -Wextra
    -O2
    -DCORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    teemuatlut/TMCStepper
    gin66/FastAccelStepper